services:
  frontend:
    image: nginx:alpine
    container_name: taskhub_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - taskhub_network

  backend:
    build:
      context: ./backend
    container_name: taskhub_backend
    ports:
      - "8000:80"
    depends_on:
      - db
    networks:
      - taskhub_network

  db:
    image: mysql:8.0
    container_name: taskhub_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: task_secret_pass
      MYSQL_DATABASE: taskhub_db
    volumes:
      - taskhub_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskhub_network

volumes:
  taskhub_data:

networks:
  taskhub_network: