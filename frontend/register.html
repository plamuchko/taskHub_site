<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>TaskHub - Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-4 shadow" style="max-width: 400px; width: 100%;">
        <h2 class="text-center mb-4">Регистрация в TaskHub</h2>
        <form id="regForm">
            <div class="mb-3">
                <label class="form-label">Потребителско име</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Парола</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Създай профил</button>
        </form>
        <div class="mt-3 text-center">
            <a href="login.html">Вече имате профил? Вход</a>
        </div>
    </div>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('http://localhost:8000/auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'register', username, password })
            });
            const data = await res.json();
            if(data.success) {
                alert('Регистрацията е успешна!');
                window.location.href = 'login.html';
            } else { alert(data.message); }
        });
    </script>
</body>
</html>
