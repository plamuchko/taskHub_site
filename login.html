<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>TaskHub - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-4 shadow" style="max-width: 400px; width: 100%;">
        <h2 class="text-center mb-4">🤖 TaskHub Login</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Потребителско име</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Парола</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Влез</button>
        </form>
        <div class="mt-3 text-center">
            <a href="register.html">Нямате профил? Регистрация</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('http://localhost:8000/auth.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', username, password })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('user', data.username);
                window.location.href = 'index.html';
            } else { alert(data.message); }
        });
    </script>
</body>
</html>
